name: publish-release
on:
  workflow_run:
    workflows:
      - build-x64
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish-release:
    # Publish after every successful build-x64 run that came from our own
    # repo (push or manual dispatch), not just tag builds.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chromium
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve version and tag
        id: meta
        run: |
          set -euo pipefail
          # Package filenames look like:
          #   aerium_150.0.7871.124-1.3_installer_x64.exe
          #   aerium_150.0.7871.124-1.3_windows_x64.zip
          file="$(ls artifacts/aerium_*_installer_x64.exe artifacts/aerium_*_windows_x64.zip 2>/dev/null | head -n1)"
          if [ -z "$file" ]; then
            echo "No Aerium package found in artifacts" >&2
            ls -R artifacts || true
            exit 1
          fi
          version="$(basename "$file" | sed -E 's/^aerium_([0-9.]+)-.*/\1/')"
          run="${{ github.event.workflow_run.run_number }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-b${run}" >> "$GITHUB_OUTPUT"
          echo "Resolved version $version, tag v${version}-b${run}"

      - name: Compute checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum $(ls aerium_*_installer_x64.exe aerium_*_windows_x64.zip 2>/dev/null) > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Aerium ${{ steps.meta.outputs.version }} (x64)
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/aerium_*_installer_x64.exe
            artifacts/aerium_*_windows_x64.zip
            artifacts/SHA256SUMS.txt
